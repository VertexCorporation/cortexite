<!DOCTYPE html>

<head>

    The path provided below has to start and end with a slash "/" in order for

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Privacy-first, hyper-personalized, and always available AI. Run AI models offline or online with Cortex.">
  <meta name="keywords" content="AI, Artificial Intelligence, Privacy, Machine Learning, Offline AI, Cortex">
  <meta name="author" content="VertexCorporation">
  <meta name="theme-color" content="#1a1a1a">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cortexai.app/">
  <meta property="og:title" content="Cortex - Core of Artificial Intelligence">
  <meta property="og:description" content="Privacy-first, hyper-personalized, and always available AI.">
  <meta property="og:image" content="/icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://cortexai.app/">
  <meta property="twitter:title" content="Cortex - Core of Artificial Intelligence">
  <meta property="twitter:description" content="Privacy-first, hyper-personalized, and always available AI.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Cortex">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Cortex</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --app-scale: 0.58;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    flt-glass-pane,
    flt-semantics-host,
    flt-scene-host,
    flt-text-editing-host {
      transform: scale(var(--app-scale));
      transform-origin: top left;
      width: calc(100% / var(--app-scale));
      height: calc(100% / var(--app-scale));
    }
  </style>
</head>
<body>
  <script>
    (function () {
      function getAppScale() {
        const width = window.innerWidth || document.documentElement.clientWidth || 0;

        if (width >= 2200) return 0.30;
        if (width >= 1800) return 0.34;
        if (width >= 1500) return 0.38;
        if (width >= 1200) return 0.44;
        if (width >= 1100) return 0.50;
        return 0.58;
      }

      function applyFlutterScale() {
        const appScale = getAppScale();
        document.documentElement.style.setProperty('--app-scale', String(appScale));

        const targets = document.querySelectorAll('flt-glass-pane, flt-semantics-host, flt-scene-host, flt-text-editing-host');
        targets.forEach((el) => {
          el.style.transform = `scale(${appScale})`;
          el.style.transformOrigin = 'top left';
          el.style.width = `${100 / appScale}%`;
          el.style.height = `${100 / appScale}%`;
        });
      }

      const observer = new MutationObserver(applyFlutterScale);
      observer.observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', applyFlutterScale);
      window.addEventListener('resize', applyFlutterScale);
      setInterval(applyFlutterScale, 1500);

      const originalSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function (name, value) {
        if (typeof name === 'string' && name.toLowerCase() === 'cache-control') {
          return;
        }
        return originalSetRequestHeader.call(this, name, value);
      };
    })();
  </script>
  <!--

    or to give the user feedback during the initialization process.

    For more details:

  -->
  <script src="flutter_bootstrap.js?v=20260326-1" async></script>
</body>
</html>
