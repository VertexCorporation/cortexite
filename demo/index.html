  <!--

    Mobile app adapted for web with viewport simulation.
    Flutter thinks it's running on a mobile device (~430px wide).
    Uses height-based scaling to maintain mobile aspect ratio on desktop.
  -->

<body>
  <script>
    /**
     * CORTEX WEB DEMO — Viewport Simulation Engine v4
     *
     * Strategy:
     * 1. Snapshot real viewport dimensions before any overrides
     * 2. Calculate a fixed mobile viewport (430 × 932) — standard iPhone 14 ratio
     * 3. Scale = min(realW/430, realH/932) → fit within desktop, preserving aspect
     * 4. Override window.innerWidth/innerHeight so Flutter sees 430×932
     * 5. CSS transform: scale the flutter-view container up
     * 6. Center the scaled app on screen
     *
     * Key insight: Height-based scaling prevents the UI from being squished.
     * The app maintains its natural mobile proportions on any desktop screen.
     */
    (function () {
      'use strict';

      // ─── Mobile device simulation ─────────────────────────────────
      var MOBILE_W = 430;   // iPhone 14/15 width
      var MOBILE_H = 932;   // iPhone 14/15 height

      // ─── Snapshot REAL viewport BEFORE any overrides ──────────────
      var REAL_W = window.innerWidth;
      var REAL_H = window.innerHeight;

      // ─── CSS probe for ongoing real viewport measurement ──────────
      // CSS vw/vh units are immune to JS property overrides
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;visibility:hidden;z-index:-9999;';
      document.documentElement.appendChild(probe);

      function getRealSize() {
        return {
          w: probe.offsetWidth || REAL_W || 1,
          h: probe.offsetHeight || REAL_H || 1
        };
      }

      // ─── Override viewport dimensions ─────────────────────────────
      // Flutter reads these to determine MediaQuery.size
      Object.defineProperty(window, 'innerWidth', {
        get: function () { return MOBILE_W; },
        configurable: true
      });
      Object.defineProperty(window, 'innerHeight', {
        get: function () { return MOBILE_H; },
        configurable: true
      });

      try {
        Object.defineProperty(document.documentElement, 'clientWidth', {
          get: function () { return MOBILE_W; },
          configurable: true
        });
        Object.defineProperty(document.documentElement, 'clientHeight', {
          get: function () { return MOBILE_H; },
          configurable: true
        });
      } catch (e) {}

      if (window.visualViewport) {
        try {
          Object.defineProperty(window.visualViewport, 'width', {
            get: function () { return MOBILE_W; },
            configurable: true
          });
          Object.defineProperty(window.visualViewport, 'height', {
            get: function () { return MOBILE_H; },
            configurable: true
          });
          Object.defineProperty(window.visualViewport, 'scale', {
            get: function () { return 1; },
            configurable: true
          });
        } catch (e) {}
      }

      // ─── Scale & center the Flutter app ───────────────────────────
      function applyScale() {
        var real = getRealSize();

        // Fit the mobile viewport within the desktop viewport
        // Use the SMALLER scale factor to ensure nothing overflows
        var scaleX = real.w / MOBILE_W;
        var scaleY = real.h / MOBILE_H;
        var scale = Math.min(scaleX, scaleY);
        if (scale < 0.1) scale = 0.1; // Safety minimum

        // Center the scaled app
        var scaledW = MOBILE_W * scale;
        var scaledH = MOBILE_H * scale;
        var offsetX = (real.w - scaledW) / 2;
        var offsetY = (real.h - scaledH) / 2;
        if (offsetX < 0) offsetX = 0;
        if (offsetY < 0) offsetY = 0;

        // Target flutter-view (modern Flutter) or flt-glass-pane (older Flutter)
        var root = document.querySelector('flutter-view') || document.querySelector('flt-glass-pane');
        if (root) {
          root.style.position = 'fixed';
          root.style.top = '0';
          root.style.left = '0';
          root.style.width = MOBILE_W + 'px';
          root.style.height = MOBILE_H + 'px';
          root.style.overflow = 'hidden';
          root.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
          root.style.transformOrigin = 'top left';
        }
      }

      // Watch for Flutter elements being created
      var observer = new MutationObserver(applyScale);
      observer.observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', applyScale);
      window.addEventListener('resize', function () {
        applyScale();
        if (window.visualViewport) {
          try { window.visualViewport.dispatchEvent(new Event('resize')); } catch (e) {}
        }
      });

      // Re-apply periodically (Flutter may re-render and reset inline styles)
      setInterval(applyScale, 1500);

      // ─── Cache-Control Header Intercept ──────────────────────────
      var origSetHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function (name, value) {
        if (typeof name === 'string' && name.toLowerCase() === 'cache-control') return;
        return origSetHeader.call(this, name, value);
      };
    })();
  </script>
