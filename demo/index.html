<body>
  <script>
    /**
     * CORTEX WEB DEMO — Viewport Simulation Engine
     *
     * Problem: The Flutter app is built for mobile (~430px width). On desktop
     * (1500px+), Flutter's MediaQuery returns the real viewport width, making
     * all proportional UI elements (screenWidth * 0.8, etc.) absurdly large.
     *
     * Solution: Override window.innerWidth/innerHeight BEFORE Flutter loads,
     * so Flutter thinks it's on a mobile device. Then use CSS transform: scale()
     * to visually enlarge the mobile-sized rendering to fill the desktop screen.
     * The browser automatically handles pointer event coordinate mapping through
     * CSS transforms, so clicks work correctly.
     */
    (function () {
      'use strict';

      // ─── Configuration ───────────────────────────────────────────
      var MOBILE_WIDTH = 430;  // Target logical width Flutter will see
      var MIN_SCALE = 1.0;     // Don't scale below 1x (actual mobile)

      // ─── Capture real dimensions BEFORE any overrides ────────────
      // We use getBoundingClientRect on <html> which isn't affected by our overrides
      function getRealDimensions() {
        var rect = document.documentElement.getBoundingClientRect();
        return { w: rect.width || 1, h: rect.height || 1 };
      }

      var real = getRealDimensions();
      // Use the real viewport aspect ratio to determine mobile height
      // This preserves the actual screen proportions
      var currentScale = Math.max(real.w / MOBILE_WIDTH, MIN_SCALE);
      var mobileHeight = Math.round(real.h / currentScale);

      // ─── Override window dimensions ──────────────────────────────
      // Flutter reads these to determine MediaQuery.size
      Object.defineProperty(window, 'innerWidth', {
        get: function () { return MOBILE_WIDTH; },
        configurable: true
      });
      Object.defineProperty(window, 'innerHeight', {
        get: function () { return mobileHeight; },
        configurable: true
      });

      // Override document client dimensions (some Flutter code paths use these)
      try {
        Object.defineProperty(document.documentElement, 'clientWidth', {
          get: function () { return MOBILE_WIDTH; },
          configurable: true
        });
        Object.defineProperty(document.documentElement, 'clientHeight', {
          get: function () { return mobileHeight; },
          configurable: true
        });
      } catch (e) { /* Some browsers may not allow this */ }

      // Override visualViewport API (Flutter's primary viewport source)
      if (window.visualViewport) {
        try {
          Object.defineProperty(window.visualViewport, 'width', {
            get: function () { return MOBILE_WIDTH; },
            configurable: true
          });
          Object.defineProperty(window.visualViewport, 'height', {
            get: function () { return mobileHeight; },
            configurable: true
          });
          Object.defineProperty(window.visualViewport, 'scale', {
            get: function () { return 1; },
            configurable: true
          });
        } catch (e) { /* Graceful fallback */ }
      }

      // ─── CSS Scale Application ───────────────────────────────────
      // Flutter renders at MOBILE_WIDTH. We scale up to fill the real viewport.
      function applyFlutterScale() {
        real = getRealDimensions();
        // Width-based scaling: fill the viewport horizontally
        currentScale = Math.max(real.w / MOBILE_WIDTH, MIN_SCALE);
        mobileHeight = Math.round(real.h / currentScale);

        // Center horizontally (in case of rounding)
        var scaledWidth = MOBILE_WIDTH * currentScale;
        var offsetX = Math.max((real.w - scaledWidth) / 2, 0);

        var selectors = 'flt-glass-pane, flt-scene-host, flt-semantics-host, flt-text-editing-host';
        var targets = document.querySelectorAll(selectors);

        for (var i = 0; i < targets.length; i++) {
          var el = targets[i];
          el.style.transform = 'translate(' + offsetX + 'px, 0) scale(' + currentScale + ')';
          el.style.transformOrigin = 'top left';
        }
      }

      // Watch for Flutter DOM elements being created
      var observer = new MutationObserver(applyFlutterScale);
      observer.observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', applyFlutterScale);
      window.addEventListener('resize', function () {
        applyFlutterScale();
        // Dispatch resize event on visualViewport so Flutter re-lays out
        if (window.visualViewport) {
          try {
            window.visualViewport.dispatchEvent(new Event('resize'));
          } catch (e) {}
        }
      });

      // Safety: periodically ensure scale is applied (Flutter may re-render)
      setInterval(applyFlutterScale, 2000);

      // ─── Cache-Control Header Intercept ──────────────────────────
      // Prevent Flutter's cache-control headers from causing issues
      var originalSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function (name, value) {
        if (typeof name === 'string' && name.toLowerCase() === 'cache-control') {
          return;
        }
        return originalSetRequestHeader.call(this, name, value);
      };
    })();
  </script>
