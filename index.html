<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    
    <script>
        var userLang = navigator.language || navigator.userLanguage; 
        
        var langCode = userLang.substring(0, 2).toLowerCase();

        var targetUrl;
        
        if (langCode === 'tr') {
            targetUrl = 'tr/index.html';
        } else {
            targetUrl = 'en/index.html';
        }
        window.location.replace(targetUrl); 

    </script>
</head>
<body>
</body>
</html>
